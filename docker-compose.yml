version: '3.8'

# All secrets MUST be set in .env or the shell environment before `docker compose up`.
# There are NO defaults — startup will fail loudly if any required variable is missing.
# Required: MONGO_USER, MONGO_PASSWORD, JWT_SECRET, JWT_REFRESH_SECRET, STEAM_API_KEY,
#           STEAM_REALM, STEAM_RETURN_URL, CLIENT_URL.
# Optional: DISCORD_BOT_TOKEN, DISCORD_GUILD_ID, DISCORD_NOTIFICATION_CHANNEL_ID,
#           DISCORD_APPROVER_ROLE_ID.

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:?MONGO_USER is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD is required}
    # No `ports:` — Mongo is reachable only from the internal docker network.

  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      - '127.0.0.1:3001:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      BIND_HOST: 0.0.0.0
      MONGODB_URI: mongodb://${MONGO_USER:?MONGO_USER is required}:${MONGO_PASSWORD:?MONGO_PASSWORD is required}@mongodb:27017/squad-pm?authSource=admin
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      STEAM_API_KEY: ${STEAM_API_KEY:?STEAM_API_KEY is required}
      STEAM_REALM: ${STEAM_REALM:?STEAM_REALM is required}
      STEAM_RETURN_URL: ${STEAM_RETURN_URL:?STEAM_RETURN_URL is required}
      CLIENT_URL: ${CLIENT_URL:?CLIENT_URL is required}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      DISCORD_NOTIFICATION_CHANNEL_ID: ${DISCORD_NOTIFICATION_CHANNEL_ID:-}
      DISCORD_APPROVER_ROLE_ID: ${DISCORD_APPROVER_ROLE_ID:-}
      # Opt-in: skip https + localhost guards for IP / LAN test installs.
      # Leave UNSET for any public-facing deployment.
      ALLOW_INSECURE_HTTP: ${ALLOW_INSECURE_HTTP:-}

volumes:
  mongo_data:
